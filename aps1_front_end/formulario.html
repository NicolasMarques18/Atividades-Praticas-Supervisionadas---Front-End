<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de cliente</title>
</head>
<body>

    <h1>Informações Pessoais</h1>

    <fieldset>
        <legend>Cadastro do Cliente</legend>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite o nome:" size="70px"><br><br>

        <label for="Idade">Idade:</label>
        <input type="text" id="idade" name="idade" placeholder="Digite a idade:"><br><br>

        <label for="Endereço">Endereço:</label>
        <input type="text" id="endereco" name="endereco" placeholder="Digite o endereço:" size="80px"><br><br>

        <label for="Cidade">Cidade:</label>
        <input type="text" id="cidade" name="cidade" placeholder="Digite a cidade:" size="60px"><br><br>

        <label for="Estado">Estado:</label>
        <input type="text" id="estado" name="estado" placeholder="UF" size="5px"><br><br>

        <label for="CEP">CEP:</label>
        <input type="text" id="cep" name="cep" placeholder="XXXXX-XXX"><br><br>

        <label for="Tel/Res">Telefone Residencial:</label>
        <input type="tel" id="telefone" name="telefone" placeholder="99 99999-9999"><br><br>

        <label for="Tel/Cel">Telefone Celular:</label>
        <input type="tel" id="telefone-celular" name="telefone-celular" placeholder="99 99999-9999"><br><br>

        <label for="Email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Digite o endereço de email:" size="90px"><br><br>

    </fieldset>
    <input type="submit" value="Enviar">
</body>
</html>
